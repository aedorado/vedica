<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Vedica - Vedic Astrology Birth Chart & Analytics{% endblock %}</title>
  <meta name="description" content="Vedica: Free Vedic astrology birth chart calculator, analytics, and conjunction insights. Explore planetary patterns, conjunctions, and more." />
  <meta name="keywords" content="Vedic astrology, birth chart, horoscope, conjunctions, analytics, planets, rashi, vedica, jyotish" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Vedica - Vedic Astrology Birth Chart & Analytics" />
  <meta property="og:description" content="Free Vedic astrology birth chart calculator, analytics, and conjunction insights. Explore planetary patterns, conjunctions, and more." />
  <meta property="og:url" content="https://vedica.vercel.app/" />
  <meta property="og:image" content="https://vedica.vercel.app/static/og-image.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Vedica - Vedic Astrology Birth Chart & Analytics" />
  <meta name="twitter:description" content="Free Vedic astrology birth chart calculator, analytics, and conjunction insights. Explore planetary patterns, conjunctions, and more." />
  <meta name="twitter:image" content="https://vedica.vercel.app/static/og-image.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block head %}{% endblock %}
  
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-glyph">✦</span>
        Vedica
      </a>
      <ul class="nav-links">
        <li><a href="/" class="{{ 'active' if request.endpoint == 'main.index' }}">Chart</a></li>
        <li><a href="/saved" class="{{ 'active' if request.endpoint == 'main.saved_charts' }}">Saved</a></li>
        <li><a href="/analytics" class="{{ 'active' if request.endpoint == 'main.analytics' }}">Analytics</a></li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀ Light</button>
    </div>
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
  
  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
