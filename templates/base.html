<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Vedica{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="brand-glyph">✦</span>
        Vedica
      </a>
      <ul class="nav-links">
        <li><a href="/" class="{{ 'active' if request.endpoint == 'main.index' }}">Chart</a></li>
        <li><a href="/saved" class="{{ 'active' if request.endpoint == 'main.saved_charts' }}">Saved</a></li>
        <li><a href="/analytics" class="{{ 'active' if request.endpoint == 'main.analytics' }}">Analytics</a></li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀ Light</button>
    </div>
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
